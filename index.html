<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyector de Evaluaciones Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- VARIABLES DE DISEÑO Y TEMAS --- */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-secondary: #636e72;
            --accent: #0984e3;
            --accent-hover: #74b9ff;
            --border-color: #dfe6e9;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --timer-color: #d63031;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --warn-bg: #fff5f5;
            --warn-border: #ff7675;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-main: #e0e0e0;
            --text-secondary: #b0b0b0;
            --accent: #00cec9;
            --accent-hover: #81ecec;
            --border-color: #2d3436;
            --shadow: 0 10px 30px rgba(0,0,0,0.3);
            --timer-color: #ff7675;
            --glass-bg: rgba(22, 33, 62, 0.8);
            --warn-bg: #1b1424;
            --warn-border: #ff7675;
        }

        /* --- ESTILOS GENERALES --- */
        * {
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 95%;
            border: 1px solid var(--border-color);
            position: relative;
        }

        /* El panel de configuración se mantiene angosto y centrado */
        #setup-screen {
            max-width: 900px;
        }

        /* La pantalla de proyección se ensancha para ocupar todo el proyector */
        #display-screen {
            max-width: 1400px;
            display: none;
        }

        h1 { margin-top: 0; font-weight: 700; color: var(--accent); text-align: center; font-size: 2.2em;}
        p.subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 30px; margin-top: -10px;}

        /* Indicador de sincronización */
        .sync-status {
            text-align: center;
            font-size: 0.85em;
            margin-bottom: 20px;
            padding: 8px;
            border-radius: 8px;
            font-weight: 600;
        }
        .sync-loading { background-color: #ffeaa7; color: #d35400; }
        .sync-success { background-color: #55efc4; color: #00b894; }
        .sync-error { background-color: #ff7675; color: #d63031; }

        /* --- BOTÓN MODO DÍA/NOCHE --- */
        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 15px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 1000;
        }
        #theme-toggle:hover {
            background-color: var(--border-color);
        }

        /* --- ESTILOS FORMULARIO (CONFIG) --- */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .full-width { grid-column: span 2; }
        .form-group { text-align: left; }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 15px;
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            color: var(--text-main);
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 110px;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        .btn-start {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 18px;
            font-size: 1.1em;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(9, 132, 227, 0.3);
        }
        
        .btn-start:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        /* --- DISTRIBUCIÓN DE PANTALLA EN DOS COLUMNAS (PROYECTOR) --- */
        .projection-grid {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 40px;
            align-items: start;
        }

        .left-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .right-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- DETALLES DE EVALUACIÓN (DERECHA) --- */
        .eval-header {
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            text-align: left;
        }

        .eval-title {
            font-size: 2.1em;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            line-height: 1.2;
        }
        
        .eval-type-badge {
            display: inline-block;
            background-color: var(--accent);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .info-vertical-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: left;
        }

        .info-item {
            background-color: var(--bg-color);
            padding: 15px 20px;
            border-radius: 10px;
            border-left: 4px solid var(--border-color);
        }
        
        .info-item.accent-border { border-left-color: var(--accent); }

        .info-label {
            font-size: 0.75em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .info-value {
            font-size: 1.15em;
            font-weight: 600;
            color: var(--text-main);
        }

        /* --- TEMPORIZADOR GRANDE (IZQUIERDA) --- */
        .timer-container {
            background-color: var(--bg-color);
            border-radius: 15px;
            padding: 30px 10px;
            text-align: center;
        }

        .timer-label {
            font-size: 1.3em;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .timer {
            font-size: 11em; /* Gigante para el proyector */
            font-weight: 700;
            color: var(--timer-color);
            line-height: 0.9;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 20px rgba(214, 48, 49, 0.15);
        }
        
        [data-theme="dark"] .timer { text-shadow: 0 0 30px rgba(255, 118, 117, 0.4); }

        .time-up { 
            animation: blink-red 1s infinite; 
        }

        @keyframes blink-red { 
            50% { opacity: 0.5; color: var(--text-main); text-shadow: none; } 
        }

        /* --- CAJA DE INDICACIONES (IZQUIERDA, ABAJO DEL TIMER) --- */
        .instructions-container {
            background-color: var(--warn-bg);
            border: 2px solid var(--warn-border);
            border-radius: 15px;
            padding: 30px;
            text-align: left;
            box-shadow: var(--shadow);
        }

        .instructions-title {
            font-size: 1.2em;
            font-weight: 700;
            color: var(--timer-color);
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .instructions-list {
            margin: 0;
            padding-left: 20px;
            font-size: 1.05em;
            line-height: 1.7;
            font-weight: 600; /* Negrita para que se lea con claridad desde atrás */
            color: var(--text-main);
        }

        .instructions-list li {
            margin-bottom: 8px;
        }

        /* --- RESPONSIVIDAD PARA PANTALLAS PEQUEÑAS --- */
        @media (max-width: 992px) {
            .projection-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .timer { font-size: 7em; }
            .container { padding: 30px; }
        }
    </style>
</head>
<body>

    <button id="theme-toggle">
        <span id="theme-icon">🌙</span> <span id="theme-text" style="font-size: 0.8em;">Noche</span>
    </button>

    <div class="container" id="setup-screen">
        <h1>Configuración de Evaluación</h1>
        <p class="subtitle">Ingresa los datos para generar la pantalla de proyección</p>
        
        <div id="sync-indicator" class="sync-status sync-loading">
            ⏳ Sincronizando hora exacta de Perú...
        </div>
        
        <div class="form-grid">
            <div class="form-group full-width">
                <label>Nombre del curso</label>
                <input type="text" id="course-name" placeholder="Ej: Circuitos Lógicos Digitales" value="Circuitos Lógicos Digitales">
            </div>
            
            <div class="form-group">
                <label>Código del curso</label>
                <input type="text" id="course-code" placeholder="Ej: MT123" value="MT123">
            </div>
            
            <div class="form-group">
                <label>Tipo de Evaluación</label>
                <input type="text" id="eval-type" placeholder="Ej: Examen Parcial, Quiz, Final" value="Examen Parcial">
            </div>

            <div class="form-group full-width">
                <label>Nombre del profesor</label>
                <input type="text" id="prof-name" placeholder="Ej: Msc. Mario Lupaca Flores" value="Msc. Mario Lupaca Flores">
            </div>
            
            <div class="form-group full-width">
                <label>Tipo de Temporizador</label>
                <select id="timer-type" onchange="toggleTimerInputs()">
                    <option value="countdown">Cuenta Regresiva (Minutos)</option>
                    <option value="endtime">Hora de Fin (Exacta)</option>
                </select>
            </div>
            
            <div class="form-group" id="div-duration">
                <label>Duración (en minutos)</label>
                <input type="number" id="duration-mins" value="60" min="1">
            </div>
            
            <div class="form-group" id="div-endtime" style="display: none;">
                <label>Hora de Fin</label>
                <input type="time" id="end-time-input">
            </div>

            <div class="form-group full-width">
                <label>Indicaciones para los Alumnos (una regla por línea)</label>
                <textarea id="instructions-input" rows="5">APAGAR Y GUARDAR CELULARES EN MOCHILA (DEBAJO DE PANTALLA)
PROHIBIDO INTERCAMBIAR MATERIALES (CALCULADORA, LAPICERO, ETC)
PROHIBIDO SALIR DEL AULA UNA VEZ INICIADO SU EVALUACIÓN
LAPIZ O LAPICERO BORRABLE NO TIENE DERECHO A RECLAMO</textarea>
            </div>
        </div>

        <button class="btn-start" onclick="startTimer()" id="btn-start" disabled>Esperando sincronización...</button>
    </div>

    <div class="container" id="display-screen">
        <div class="projection-grid">
            
            <div class="left-column">
                <div class="timer-container">
                    <div class="timer-label">TIEMPO RESTANTE</div>
                    <div class="timer" id="time-remaining">00:00:00</div>
                </div>

                <div class="instructions-container" id="instructions-box">
                    <div class="instructions-title">🚨 INDICACIONES DE LA EVALUACIÓN</div>
                    <ul class="instructions-list" id="disp-instructions"></ul>
                </div>
            </div>

            <div class="right-column">
                <div class="eval-header">
                    <div class="eval-title" id="disp-course"></div>
                    <div class="eval-type-badge" id="disp-eval-type"></div>
                </div>

                <div class="info-vertical-stack">
                    <div class="info-item">
                        <div class="info-label">Código</div>
                        <div class="info-value" id="disp-code"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Profesor</div>
                        <div class="info-value" id="disp-prof"></div>
                    </div>
                    <div class="info-item accent-border">
                        <div class="info-label">Fecha</div>
                        <div class="info-value" id="disp-date"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Hora Inicio</div>
                        <div class="info-value" id="disp-start"></div>
                    </div>
                    <div class="info-item accent-border">
                        <div class="info-label">Hora Fin</div>
                        <div class="info-value" id="disp-end"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let interval;
        let timeOffset = 0; // Guardará la diferencia entre la PC y la hora de internet

        // --- GESTIÓN DE TEMAS (DÍA/NOCHE) ---
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');
        const body = document.body;

        const currentTheme = localStorage.getItem('theme') || 'light';
        body.setAttribute('data-theme', currentTheme);
        updateThemeUI(currentTheme);

        themeToggle.addEventListener('click', () => {
            let theme = body.getAttribute('data-theme');
            let newTheme = theme === 'light' ? 'dark' : 'light';
            
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeUI(newTheme);
        });

        function updateThemeUI(theme) {
            if (theme === 'dark') {
                themeIcon.innerText = '☀️';
                themeText.innerText = 'Día';
            } else {
                themeIcon.innerText = '🌙';
                themeText.innerText = 'Noche';
            }
        }

        // --- SINCRONIZACIÓN DE HORA (NTP) ---
        async function syncTime() {
            const btnStart = document.getElementById('btn-start');
            const indicator = document.getElementById('sync-indicator');
            
            try {
                // Fetch a la API pública para la zona horaria de Lima
                const response = await fetch('https://worldtimeapi.org/api/timezone/America/Lima');
                if (!response.ok) throw new Error("Error en la respuesta de la API");
                
                const data = await response.json();
                const realTime = new Date(data.datetime);
                const localTime = new Date();
                
                // Calculamos el desfase de la computadora
                timeOffset = realTime.getTime() - localTime.getTime();
                
                indicator.className = 'sync-status sync-success';
                indicator.innerText = '✅ Hora sincronizada correctamente con el servidor de Perú.';
            } catch (error) {
                console.warn("No se pudo obtener la hora de internet, usando hora local.", error);
                indicator.className = 'sync-status sync-error';
                indicator.innerText = '⚠️ Sin internet. Se utilizará la hora local de esta computadora.';
                timeOffset = 0; // Si falla, el desfase es 0 (usa la hora de la PC)
            } finally {
                // Habilitamos el botón independientemente de si hubo error o no
                btnStart.disabled = false;
                btnStart.innerText = 'Iniciar y Proyectar';
            }
        }

        // Función que retorna la hora real compensando el error del reloj de la PC
        function getRealNow() {
            return new Date(Date.now() + timeOffset);
        }

        // Iniciar sincronización al cargar la web
        syncTime();

        // --- LÓGICA DEL TEMPORIZADOR ---
        function toggleTimerInputs() {
            const type = document.getElementById('timer-type').value;
            if (type === 'countdown') {
                document.getElementById('div-duration').style.display = 'block';
                document.getElementById('div-endtime').style.display = 'none';
            } else {
                document.getElementById('div-duration').style.display = 'none';
                document.getElementById('div-endtime').style.display = 'block';
            }
        }

        function formatTimeStr(date) {
            return date.getHours().toString().padStart(2, '0') + ':' + 
                   date.getMinutes().toString().padStart(2, '0') + ':' + 
                   date.getSeconds().toString().padStart(2, '0');
        }

        function startTimer() {
            const now = getRealNow(); // Usamos la hora sincronizada
            let endTime;

            const type = document.getElementById('timer-type').value;

            if (type === 'countdown') {
                const mins = parseInt(document.getElementById('duration-mins').value);
                if (isNaN(mins) || mins <= 0) return alert('Ingrese una duración válida.');
                endTime = new Date(now.getTime() + mins * 60000);
            } else {
                const timeStr = document.getElementById('end-time-input').value;
                if (!timeStr) return alert('Ingrese una hora de fin.');
                const [hours, minutes] = timeStr.split(':');
                endTime = new Date(now);
                endTime.setHours(parseInt(hours), parseInt(minutes), 0, 0);
                
                if (endTime < now) endTime.setDate(endTime.getDate() + 1);
            }

            // Llenar datos en pantalla de proyección
            document.getElementById('disp-course').innerText = document.getElementById('course-name').value;
            document.getElementById('disp-eval-type').innerText = document.getElementById('eval-type').value;
            document.getElementById('disp-code').innerText = document.getElementById('course-code').value;
            document.getElementById('disp-prof').innerText = document.getElementById('prof-name').value;
            
            const day = now.getDate().toString().padStart(2, '0');
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const year = now.getFullYear();
            document.getElementById('disp-date').innerText = `${day}/${month}/${year}`;
            
            document.getElementById('disp-start').innerText = formatTimeStr(now);
            document.getElementById('disp-end').innerText = formatTimeStr(endTime);

            // Cargar indicaciones/reglas en la lista
            const instructionsInput = document.getElementById('instructions-input').value;
            const instructionsList = document.getElementById('disp-instructions');
            const instructionsBox = document.getElementById('instructions-box');
            
            instructionsList.innerHTML = ''; // Limpiar anteriores
            
            if (instructionsInput.trim()) {
                const lines = instructionsInput.split('\n');
                lines.forEach(line => {
                    if (line.trim()) {
                        const li = document.createElement('li');
                        li.innerText = line.trim();
                        instructionsList.appendChild(li);
                    }
                });
                instructionsBox.style.display = 'block';
            } else {
                instructionsBox.style.display = 'none'; // Ocultar si no hay texto
            }

            // Cambiar pantallas
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('display-screen').style.display = 'block';

            updateDisplay(endTime);
            interval = setInterval(() => updateDisplay(endTime), 1000);
        }

        function updateDisplay(endTime) {
            const now = getRealNow(); // Consultamos la hora sincronizada en cada tick
            const diff = endTime - now;
            const display = document.getElementById('time-remaining');

            if (diff <= 0) {
                clearInterval(interval);
                display.innerText = "00:00:00";
                display.classList.add('time-up');
                return;
            }

            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            display.innerText = 
                h.toString().padStart(2, '0') + ':' + 
                m.toString().padStart(2, '0') + ':' + 
                s.toString().padStart(2, '0');
        }
    </script>
</body>
</html>
